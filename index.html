// AIを呼ぶ。失敗時はnullを返し、呼び出し側でキーワード版にフォールバック。
async function analyzeWorryAI(text, typeHint) {
  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        worry: text.slice(0, 1000),
        type_hint: typeHint || ""
      })
    });
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.ok || !data.result) return null;
    return data.result;
  } catch {
    return null;
  }
}
function analyzeWorry(text) {
  if (!text || text.trim().length < 2) return null;
  const scores = {};
  ORDER.forEach(k => scores[k] = 0);
  ORDER.forEach(k => {
    KW[k].forEach(w => {
      if (text.includes(w)) scores[k] += 1;
    });
  });
  const ranked = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const top = ranked[0][1] > 0 ? ranked[0][0] : null;
  // 「近づけば消えるズレか / 手放せば消える借り物か」判定の素材
  // 同期・安定の語が強い = 借り物の可能性 / 生成・外在・維持 = 近づけるズレ寄り
  const borrowed = scores.Y + scores.S > scores.G + scores.E + scores.M;
  return {
    top,
    scores,
    ranked,
    borrowed,
    hasSignal: ranked[0][1] > 0
  };
}
